<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>라이브 회차별 당일매출</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #ffffff;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    padding: 32px 24px;
  }
  .chart-wrap {
    background: #ffffff;
    border-radius: 16px;
    padding: 28px 20px 24px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    max-width: 900px;
    margin: 0 auto;
  }
  h2 {
    font-size: 15px;
    font-weight: 700;
    color: #111;
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }
  p.sub {
    font-size: 12px;
    color: #888;
    margin-bottom: 12px;
  }
  .badges {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .badge.gray { background: #F3F4F6; color: #6B7280; }
  .badge.blue { background: #EFF6FF; color: #2563EB; }
  .canvas-wrap {
    position: relative;
    width: 100%;
    height: 320px;
  }
  @media (max-width: 600px) {
    body { padding: 16px 12px; }
    .chart-wrap { padding: 20px 12px 16px; }
    .canvas-wrap { height: 240px; }
    h2 { font-size: 13px; }
  }
</style>
</head>
<body>
<div class="chart-wrap">
  <h2>쇼핑라이브 회차별 당일매출</h2>
  <p class="sub">담당자 전환 전후 비교</p>
  <div class="badges">
    <span class="badge gray">전 담당자 → 2026.02.10</span>
    <span class="badge blue">허선영 담당 2026.03.10 →</span>
  </div>
  <div class="canvas-wrap">
    <canvas id="chartLive"></canvas>
  </div>
</div>

<script>
const labels = [
  "01.13", "01.27", "02.10",
  "03.10", "03.24\n신상위크", "04.02", "04.21"
];

const 전담당자 = [7678140, 8702190, 5902150, null, null, null, null];
const 허선영 = [null, null, null, 11388550, 13115230, 16455300, 10073250];

new Chart(document.getElementById('chartLive'), {
  type: 'bar',
  data: {
    labels,
    datasets: [
      {
        label: '전 담당자',
        data: 전담당자,
        backgroundColor: 'rgba(156,163,175,0.7)',
        borderColor: 'rgba(156,163,175,0)',
        borderRadius: 6,
        borderSkipped: false
      },
      {
        label: '허선영 담당',
        data: 허선영,
        backgroundColor: 'rgba(37,99,235,0.75)',
        borderColor: 'rgba(37,99,235,0)',
        borderRadius: 6,
        borderSkipped: false
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {
        position: 'bottom',
        labels: {
          font: { size: 11, family: "'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" },
          color: '#555',
          usePointStyle: true,
          pointStyleWidth: 10,
          padding: 16
        }
      },
      tooltip: { enabled: false }
    },
    scales: {
      x: {
        grid: { display: false },
        ticks: {
          font: { size: 10 },
          color: '#999',
          maxRotation: 0
        }
      },
      y: {
        grid: { color: 'rgba(0,0,0,0.04)' },
        ticks: { display: false }
      }
    }
  }
});
</script>
</body>
</html>
