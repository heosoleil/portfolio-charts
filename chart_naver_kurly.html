<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>네이버 스마트스토어 매출 추이</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #ffffff;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    padding: 32px 24px;
  }
  .chart-wrap {
    background: #ffffff;
    border-radius: 16px;
    padding: 28px 20px 24px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    max-width: 900px;
    margin: 0 auto;
  }
  h2 {
    font-size: 15px;
    font-weight: 700;
    color: #111;
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }
  p.sub {
    font-size: 12px;
    color: #888;
    margin-bottom: 12px;
  }
  .badges {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .badge.gray { background: #F3F4F6; color: #6B7280; }
  .badge.blue { background: #EFF6FF; color: #2563EB; }
  .badge.green { background: #F0FDF4; color: #16A34A; }
  .canvas-wrap {
    position: relative;
    width: 100%;
    height: 320px;
  }
  @media (max-width: 600px) {
    body { padding: 16px 12px; }
    .chart-wrap { padding: 20px 12px 16px; }
    .canvas-wrap { height: 240px; }
    h2 { font-size: 13px; }
  }
</style>
</head>
<body>
<div class="chart-wrap">
  <h2>네이버 스마트스토어 월 매출 추이</h2>
  <p class="sub">2025.01 — 2026.04 · 담당자 전환 전후 비교</p>
  <div class="badges">
    <span class="badge gray">전 담당자 → 2026.01.09</span>
    <span class="badge blue">허선영 담당 2026.01.10 →</span>
    <span class="badge green">점선: 예상 마감</span>
  </div>
  <div class="canvas-wrap">
    <canvas id="chartNaver"></canvas>
  </div>
</div>

<script>
const labels = [
  "25-01","25-02","25-03","25-04","25-05","25-06",
  "25-07","25-08","25-09","25-10","25-11","25-12",
  "26-01","26-02","26-03","26-04"
];

// 전 담당자 구간 (25-01 ~ 26-01, 이후 null)
const 전담당자 = [
  52633860,53952530,56378320,59779940,58312790,70639060,
  73662050,77751250,72694360,74024330,86133920,90552170,
  96089200,null,null,null
];

// 허선영 담당 구간 (26-01 겹치게 시작, 26-04는 예상)
const 허선영실적 = [
  null,null,null,null,null,null,
  null,null,null,null,null,null,
  96089200,94840290,152422870,null
];

const 허선영예상 = [
  null,null,null,null,null,null,
  null,null,null,null,null,null,
  null,null,152422870,150000000
];

new Chart(document.getElementById('chartNaver'), {
  type: 'line',
  data: {
    labels,
    datasets: [
      {
        label: '전 담당자',
        data: 전담당자,
        borderColor: '#9CA3AF',
        backgroundColor: 'rgba(156,163,175,0.07)',
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 0,
        tension: 0.4,
        fill: true,
        spanGaps: false
      },
      {
        label: '허선영 담당',
        data: 허선영실적,
        borderColor: '#2563EB',
        backgroundColor: 'rgba(37,99,235,0.08)',
        borderWidth: 2.5,
        pointRadius: 0,
        pointHoverRadius: 0,
        tension: 0.4,
        fill: true,
        spanGaps: false
      },
      {
        label: '예상 마감 (26-04)',
        data: 허선영예상,
        borderColor: '#16A34A',
        backgroundColor: 'rgba(22,163,74,0.05)',
        borderWidth: 2,
        borderDash: [6, 4],
        pointRadius: 0,
        pointHoverRadius: 0,
        tension: 0.4,
        fill: false,
        spanGaps: false
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {
        position: 'bottom',
        labels: {
          font: { size: 11, family: "'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" },
          color: '#555',
          usePointStyle: true,
          pointStyleWidth: 10,
          padding: 16
        }
      },
      tooltip: { enabled: false }
    },
    scales: {
      x: {
        grid: { color: 'rgba(0,0,0,0.04)' },
        ticks: {
          font: { size: 10 },
          color: '#999',
          maxRotation: 0,
          autoSkip: false
        }
      },
      y: {
        grid: { color: 'rgba(0,0,0,0.04)' },
        ticks: { display: false }
      }
    }
  }
});
</script>
</body>
</html>
