<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채널별 월 매출 추이</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #ffffff;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    padding: 32px 24px;
  }
  .chart-wrap {
    background: #ffffff;
    border-radius: 16px;
    padding: 28px 20px 20px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    max-width: 900px;
    margin: 0 auto;
  }
  h2 {
    font-size: 15px;
    font-weight: 700;
    color: #111;
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }
  p.sub {
    font-size: 12px;
    color: #888;
    margin-bottom: 20px;
  }
  .canvas-wrap {
    position: relative;
    width: 100%;
    height: 320px;
  }
  @media (max-width: 600px) {
    body { padding: 16px 12px; }
    .chart-wrap { padding: 20px 12px 16px; }
    .canvas-wrap { height: 240px; }
    h2 { font-size: 13px; }
  }
</style>
</head>
<body>
<div class="chart-wrap">
  <h2>채널별 월 매출 추이</h2>
  <p class="sub">2023.01 — 2025.12 · 자사몰 / 컬리 / 카카오선물하기 / 29CM</p>

    <canvas id="chart1"></canvas>
  </div>
</div>

</body>
</html>
